<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Tails Pet Care</title>

    <style>

    body{
        background-color:#b5bc9a;
        font-family:Arial, sans-serif;
        margin:20px;
    }

    h1,h2{
        text-align:center;
        color:#3E4A2F;
    }

   header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}

header img {
    border-radius: 50%;
}

header h1 {
    color: #3E4A2F;
    margin: 0;
}
    }

    form{
        background-color:#f8f6ed;
        padding:20px;
        border-radius:10px;
        border:2px solid #3E4A2F;
    }

    input,select,textarea{
        width:100%;
        padding:8px;
        margin-top:5px;
        margin-bottom:15px;
        box-sizing:border-box;
    }

    input[type=submit]{
        background-color:#3E4A2F;
        color:white;
        border:none;
        cursor:pointer;
    }

    nav{
        text-align:center;
        margin-top:20px;
    }

    nav a{
        text-decoration:none;
        color:#3E4A2F;
        font-weight:bold;
        margin:10px;
    }

    footer{
        text-align:center;
        margin-top:20px;
        color:#3E4A2F;
    }

    </style>
<header>
    <img src="IMG_1963.png" alt="Happy Tails Logo" width="80" height="80">
    <h1>Happy Tails Pet Care</h1>
</header>
</head>

<body>

<h2>Book a Appointment</h2>
<form>

<label>Full Name</label><br>
<input type="text" placeholder="Enter your name">

<label>Email Address</label><br>
<input type="email" placeholder="Enter your email">

<label>Phone Number</label><br>
<input type="tel" placeholder="Enter your phone number">

<label>Pet Name</label><br>
<input type="text" placeholder="Enter pet name">

<label>Pet Type</label><br>
<select>
    <option>Select Pet Type</option>
    <option>Dog</option>
    <option>Cat</option>
    <option>Bird</option>
    <option>Rabbit</option>
    <option>Fish</option>
    <option>Hamster</option>
    <option>Parrot</option>
    <option>Turtle</option>
    <option>Other</option>
</select>

<label>Preferred Appointment Date</label><br>
<input type="date">

<label>Preferred Time</label><br>
<input type="time">

<label>Service Required</label><br>
<select>
    <option>Select a Service</option>
    <option>Pet Grooming</option>
    <option>Veterinary Care</option>
    <option>Pet Adoption</option>
    <option>Pet Boarding</option>
    <option>Dog Walking</option>
    <option>Pet Training</option>
    <option>Pet Food & Accessories</option>
    <option>Health Consultation</option>
</select>

<label>Additional Message</label><br>
<textarea rows="5" placeholder="Write your message here..."></textarea>

<input type="submit" value="Book Appointment">

</form>

<nav>
    <a href="index.html">Home</a> |
    <a href="about.html">About Us</a> |
    <a href="services.html">Services</a> |
    <a href="contact.html">Contact</a>|
</nav>

<footer>
<hr>
Happy Tails Pet Care © 2026
</footer>

</body>
</html>
